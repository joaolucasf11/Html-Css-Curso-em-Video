<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tags em HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <p>Em HTML5, podemos inserir os elementos da lista a seguir. Passe o mouse em cima dos termos para descobrir que tag usar em cada caso</p>
    <ul>
        <li><abbr title="Use a tag p">Parágrafos</abbr></li>
        <li><abbr title="Use a tag h1 á h6">Titulos</abbr></li>
        <li><abbr title="Use a tag img">Imagens</abbr></li>
        <li><abbr title="Use a tag abbr">Abreviações</abbr></li>
        <li><abbr title="Use a tag code">Codico-fonte</abbr></li>
        <li><abbr title="Use as tags ol e li">Listas numeradas</abbr></li>
        <li><abbr title="Use as tags ul e li">Listas com demarcadores</abbr></li>
        </ul>
</body>
</html>
