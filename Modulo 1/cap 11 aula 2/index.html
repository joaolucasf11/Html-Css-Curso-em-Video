<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midias em HTML5</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>Tente abrir em dispositivos diferentes ou apenas mude o tamanho do navegador</p>

    <picture>
        <source media="(max-width: 800px)" srcset="imagens/htmlpequeno.png" type="image/png">
        <source media="(max-width: 1000px)" srcset="imagens/htmlmedio.png" type="image/png">
        <img src="imagens/htmlgrande.png" alt="imagem flexivel">
    </picture>
</body>
</html>
