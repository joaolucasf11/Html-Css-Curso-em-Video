<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Trabalhando com listas</h1>
    <h2>Listas ordenadas</h2>
    <ol type="I">
        <li>Acordar
        <li>Tomar café
        <li>Escovar os dentes
        <li>Escola
        <li>Almoçar
    </ol>
    <H2>Listas não ordenada</H2>
    <ul type="circle">
        <li>Tomate
        <li>Alface
        <li>Feijão
        <li>Azeite
</body>
</html>
